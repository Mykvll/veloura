# Dependabot configuration
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # Open at most a handful of PRs at once so review stays manageable.
    open-pull-requests-limit: 10
    # Bundle non-breaking updates into a single PR to cut noise. Major bumps
    # (e.g. Next, React) still get their own PR so they can be reviewed on their own.
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      # Also batch security fixes together when several land at once.
      security:
        applies-to: security-updates
        update-types:
          - "minor"
          - "patch"
